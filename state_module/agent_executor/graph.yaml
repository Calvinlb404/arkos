# Subagent state graph. Follows plan_steps literally, one step per loop.
# Never re-plans. If a step fails or is ambiguous, it routes to ask_human
# instead of silently deviating. Change this file when you want subagents
# to be smarter (re-plan on failure, skip steps, etc.).

initial: executor

states:
  executor:
    description: "decides the next plan step: tool call, human question, or done"
    type: executor
    transition:
      next: [use_tool, ask_human, executor_done]

  use_tool:
    description: "executes the tool chosen for the current plan step"
    type: executor_tool
    transition:
      next: [executor]

  ask_human:
    description: "pauses the subagent and asks the human a binary or text question"
    type: approval
    transition:
      next: [executor, executor_done]

  executor_done:
    description: "final summary; marks the task completed"
    type: executor_done
    transition:
      next: []
