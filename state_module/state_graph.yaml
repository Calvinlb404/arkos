

initial: agent_reply

states:
  ask_user:
    description: "state used for input from user"
    type: user
    transition:
      next: [agent_reply]

  agent_reply:
    description: "state used for your reasoning and simple replies that do not require action"
    type: agent
    transition:
      next: [ask_user, use_tool, workshop_plan]

  workshop_plan:
    description: "state used when the user wants buddy to DO something. buddy drafts a plan and waits for approval on the dashboard. choose this whenever action on external systems, files, or websites is implied."
    type: plan
    transition:
      next: [ask_user]

  use_tool:
    description: "state used for tool use AFTER the user has approved a workshopped plan"
    type: tool
    transition:
      next: [agent_reply]
