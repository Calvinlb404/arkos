initial: agent_reply

states:
  ask_user:
    description: "state used for input from user"
    type: user
    transition:
      next: [agent_reply]

  agent_reply:
    description: "state used for your reasoning and simple replies that do not require action"
    type: agent
    transition:
      next: [ask_user, use_tool, workshop_plan, computer_plan]

  workshop_plan:
    description: "state used when the user wants buddy to DO something on an external service (calendar, linear, etc). buddy drafts a plan and waits for approval."
    type: plan
    transition:
      next: [ask_user]

  computer_plan:
    description: "state used when the user wants buddy to do work on the persistent computer (write/run code, edit files, build things). buddy drafts a plan and waits for approval; NOTHING runs until approved."
    type: computer_plan
    transition:
      next: [ask_user]

  use_tool:
    description: "state used for tool use AFTER the user has approved a workshopped plan"
    type: tool
    transition:
      next: [agent_reply]
